services:
  postgres:
    image: postgres:16-alpine
    container_name: garageflow-postgres
    environment:
      POSTGRES_DB: garageflow
      POSTGRES_USER: garageflow
      POSTGRES_PASSWORD: garageflow
    ports:
      - "5432:5432"
    volumes:
      - garageflow_postgres_data:/var/lib/postgresql/data

volumes:
  garageflow_postgres_data:
